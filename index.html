const MAX_DAILY_ATTEMPTS = 3;

function checkDailyQ(id) {
  const q = dailyQuestions.find(x=>x.id===id);
  if(!q) return;
  const userAns = (document.getElementById("dans_"+id)||{}).value||"";
  let isCorrect = false;
  if(q.answer) {
    isCorrect = userAns.trim().toLowerCase() === q.answer.trim().toLowerCase();
  } else {
    // No expected answer — treat as correct (free-form practice)
    isCorrect = true;
  }

  // Get current attempt count from saved state
  const prev = myDailyAttempts[id] || {};
  const attempts = (prev.attempts || 0) + 1;

  let answered, correct, outOfAttempts;
  if(isCorrect) {
    answered = true; correct = true; outOfAttempts = false;
  } else if(attempts >= MAX_DAILY_ATTEMPTS) {
    answered = true; correct = false; outOfAttempts = true;
  } else {
    answered = false; correct = false; outOfAttempts = false;
  }

  // Update local cache immediately
  myDailyAttempts[id] = {
    username: currentUser,
    questionId: id,
    question: q.q,
    date: q.date || getDateKey(q.ts || Date.now()),
    userAnswer: userAns,
    correct,
    answered,
    outOfAttempts,
    attempts,
    ts: Date.now()
  };

  // ── Always persist to Firestore (every attempt, not just final) ──
  db.collection("dailyAttempts").doc(currentUser + "_" + id).set(myDailyAttempts[id]);

  // ── Link to progress on EVERY attempt (not just when fully answered) ──
  // This way admin always sees daily activity in progress bar
  userProgress[id] = true;
  saveProgress(id, true);

  renderDailyMode();
}

function delDailyQ(id) {
  if(!confirm("Remove this daily question?")) return;
  db.collection("daily").doc(id).delete();
}

function clearAllDaily() {
  if(!confirm("Clear ALL daily practice questions across all dates? This cannot be undone.")) return;
  const batch = db.batch();
  dailyQuestions.forEach(q => batch.delete(db.collection("daily").doc(q.id)));
  batch.commit();
}

function clearDateDaily() {
  const dateQs = dailyQuestions.filter(q => (q.date || getDateKey(q.ts||Date.now())) === selectedDailyDate);
  if(!dateQs.length) return;
  if(!confirm(`Clear all ${dateQs.length} questions for ${formatDateDisplay(selectedDailyDate)}?`)) return;
  const batch = db.batch();
  dateQs.forEach(q => batch.delete(db.collection("daily").doc(q.id)));
  batch.commit();
}

  const all = getAllQ();
  const tabQs = all.filter(q=>q.tab===activeTab);
  const tabDone = tabQs.filter(q=>userProgress[q.id]).length;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-item"><div class="stat-num" style="color:var(--accent)">${tabQs.length}</div><div class="stat-lbl">This Tab</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--green)">${tabDone}</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--accent2)">${tabQs.length-tabDone}</div><div class="stat-lbl">Remaining</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--text)">${all.length}</div><div class="stat-lbl">Total Qs</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--green)">${all.filter(q=>userProgress[q.id]).length}</div><div class="stat-lbl">Total Done</div></div>`;
}

function renderFilterBar() {
  document.getElementById("filterBar").innerHTML = `
    <input class="search-input" placeholder="🔍 Search..." oninput="onSearch(this.value)" value="${searchTerm}"/>
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
    <button class="filter-btn f-done ${activeFilter==='done'?'active':''}" onclick="setFilter('done')">✅ Done</button>
    <button class="filter-btn f-pend ${activeFilter==='pending'?'active':''}" onclick="setFilter('pending')">⏳ Pending</button>`;
}

function renderSubtopicBar() {
  const tabQs = getAllQ().filter(q=>q.tab===activeTab);
  const subtopics = [...new Set(tabQs.map(q=>q.subtopic||"General"))];
  if(subtopics.length <= 1) { document.getElementById("subtopicBar").innerHTML=""; return; }
  const counts = {};
  tabQs.forEach(q=>{ const k=q.subtopic||"General"; counts[k]=(counts[k]||0)+1; });
  document.getElementById("subtopicBar").innerHTML =
    `<button class="sub-btn ${activeSubtopic==='all'?'active':''}" onclick="setSubtopic('all')">All <span class="sub-cnt">${tabQs.length}</span></button>` +
    subtopics.map(s=>`<button class="sub-btn ${activeSubtopic===s?'active':''}" onclick="setSubtopic('${s.replace(/'/g,"\\'")}')">
      ${esc(s)} <span class="sub-cnt">${counts[s]||0}</span></button>`).join("");
}

function setSubtopic(s){ activeSubtopic=s; renderSubtopicBar(); renderQuestions(); }
function setFilter(f){activeFilter=f;renderAll();}
function onSearch(v){searchTerm=v.toLowerCase();renderAll();}

function getSubtopicsForTab(tabId) {
  return [...new Set(getAllQ().filter(q=>q.tab===tabId).map(q=>q.subtopic||"General"))];
}

let addedCount = 0;
function toggleUpload(){ uploadOpen=!uploadOpen; renderUpload(); }

function addQ(stayOpen) {
  const q=document.getElementById("uq").value.trim();
  const a=document.getElementById("ua").value.trim();
  const optsRaw=document.getElementById("uopts").value.trim();
  const sub=document.getElementById("usub").value.trim()||"Custom";
  const tab=document.getElementById("utab").value;
  const src=document.getElementById("usrc").value.trim()||"Added by "+currentUser;
  if(!q){alert("Please enter a question!"); return;}
  const options = optsRaw ? optsRaw.split("\n").map(s=>s.trim()).filter(Boolean) : null;
  const id="cq_"+Date.now();
  const newQ={id,tab,subtopic:sub,q,answer:a,source:src,addedBy:currentUser};
  if(options && options.length) newQ.options=options;
  saveExtraQuestion(newQ);
  addedCount++;
  if(stayOpen) {
    // clear fields but keep subtopic/tab/source
    document.getElementById("uq").value="";
    document.getElementById("ua").value="";
    document.getElementById("uopts").value="";
    const c=document.getElementById("addedCount");
    if(c) c.textContent=`✅ ${addedCount} question(s) added`;
  } else {
    addedCount=0;
    activeTab=tab;
    uploadOpen=false;
    renderAll();
  }
}

function renderQuestions() {
  const area=document.getElementById("questionArea");
  let qs=getAllQ().filter(q=>q.tab===activeTab);
  if(activeSubtopic!=="all") qs=qs.filter(q=>(q.subtopic||"General")===activeSubtopic);
  if(activeFilter==="done") qs=qs.filter(q=>userProgress[q.id]);
  if(activeFilter==="pending") qs=qs.filter(q=>!userProgress[q.id]);
  if(searchTerm) qs=qs.filter(q=>
    q.q.toLowerCase().includes(searchTerm)||
    (q.subtopic||"").toLowerCase().includes(searchTerm)||
    (q.answer||"").toLowerCase().includes(searchTerm));

  if(!qs.length){area.innerHTML=`<div class="no-qs">No questions found.</div>`;return;}

  const groups={};
  qs.forEach(q=>{const k=q.subtopic||"General";if(!groups[k])groups[k]=[];groups[k].push(q);});

  let num=1;
  area.innerHTML=Object.keys(groups).map(sub=>{
    const cards=groups[sub].map(q=>{
      const done=!!userProgress[q.id];
      return `<div class="q-card ${done?'done':''}" id="card_${q.id}">
        <div class="q-num">${num++}</div>
        <div class="q-body">
          <div class="q-text">${esc(q.q)}</div>
          ${q.options?`<div class="q-opts">${q.options.map(o=>`<div class="q-opt">${esc(o)}</div>`).join("")}</div>`:""}
          <div class="q-answer">${esc(q.answer||"")}</div>
          <div class="q-meta">
            <span class="q-tag">${esc(q.subtopic||"")}</span>
            <span class="q-src">📌 ${esc(q.source||"")}</span>
            ${q.addedBy?`<span class="q-tag" style="background:#2a1f40;color:#b088ff">👤 ${esc(q.addedBy)}</span>`:""}
          </div>
          <div class="q-actions">
            <button class="btn-sm btn-ans" onclick="toggleAns('${q.id}')">💡 Answer</button>
            <button class="btn-sm btn-done-q" onclick="toggleDone('${q.id}')">${done?'✅ Done':'Mark Done'}</button>
            <button class="btn-sm" style="border-color:#7a80a0;color:#7a80a0" onclick="openEdit('${q.id}')">✏️ Edit</button>
            <button class="btn-sm btn-del" onclick="delQ('${q.id}')">🗑 Delete</button>
          </div>
        </div>
      </div>`;
    }).join("");
    return activeSubtopic==="all"
      ? `<div class="sec-label">${sub}</div><div class="q-list">${cards}</div>`
      : `<div class="q-list">${cards}</div>`;
  }).join("");
}
